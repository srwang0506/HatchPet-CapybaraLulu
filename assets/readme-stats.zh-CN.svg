    <circle cx="250" cy="30" r="8" fill="#f36a10"/>
    <text x="22" y="105" fill="#4c2a16" font-family="Avenir Next, Arial, sans-serif" font-size="66" font-weight="800">15</text>
    <text x="22" y="140" fill="#7d9b2e" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" letter-spacing="2">视觉动作片段</text>
    <text x="22" y="169" fill="#795647" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="500">都有名称与归属状态</text>
  </g>

  <g transform="translate(610 12)">
    <rect width="280" height="196" rx="28" fill="#f4f7e9" stroke="#dce6bf" stroke-width="2"/>
    <rect x="22" y="22" width="44" height="8" rx="4" fill="#7d9b2e"/>
    <circle cx="250" cy="30" r="8" fill="#f36a10"/>
    <text x="22" y="105" fill="#4c2a16" font-family="Avenir Next, Arial, sans-serif" font-size="66" font-weight="800">9</text>
    <text x="22" y="140" fill="#7d9b2e" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" letter-spacing="2">原生触发状态</text>
    <text x="22" y="169" fill="#795647" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="500">对应真实桌面事件</text>
  </g>

  <g transform="translate(910 12)">
    <rect width="280" height="196" rx="28" fill="#fff6ec" stroke="#f2dcc5" stroke-width="2"/>
    <rect x="22" y="22" width="44" height="8" rx="4" fill="#f36a10"/>
    <circle cx="250" cy="30" r="8" fill="#7d9b2e"/>
