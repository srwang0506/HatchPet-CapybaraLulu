<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" role="img" aria-labelledby="title description">
  <title id="title">水豚噜噜项目数据</title>
  <desc id="description">20 个同步时间相位、15 个视觉动作片段、9 个原生状态，以及 16 个注视方向。</desc>

  <g transform="translate(10 12)">
    <rect width="280" height="196" rx="28" fill="#fff2e5" stroke="#f5d6b7" stroke-width="2"/>
