    <text x="22" y="140" fill="#f36a10" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" letter-spacing="2">同步时间相位</text>
    <text x="22" y="169" fill="#795647" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="500">完整循环 · 1.20 秒</text>
  </g>

  <g transform="translate(310 12)">
